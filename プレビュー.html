<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パチスロ チーム収支管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

:root {
  --surface-0: #000000;
  --surface-1: #0e0e10;
  --surface-2: #000000;
  --text-primary: #ffffff;
  --text-secondary: #aeaeb2;
  --text-muted: #7c7c80;
  --text-accent: #00e08a;
  --text-success: #00e08a;
  --text-danger: #ff5000;
  --text-warning: #ffb340;
  --text-pro: #bf5af2;
  --border: #1c1c1e;
  --border-strong: #2a2a2c;
  --border-accent: #00e08a;
  --border-danger: #ff5000;
  --bg-accent: rgba(0,224,138,0.13);
  --bg-warning: rgba(255,179,64,0.13);
  --bg-pro: rgba(191,90,242,0.16);
  --fill-accent: #00e08a;
  --on-accent: #00150d;
  --sun: #ff6b8a;
  --sat: #5ac8fa;
  --radius: 10px;
}

body { color: var(--text-primary); background: #000;
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'SF Pro Display', sans-serif; min-height: 100vh; }

html,body{margin:0;background:#000;height:100%;overflow:hidden;overscroll-behavior:none}
.app{width:100%;max-width:480px;margin:0 auto;background:#000;height:100dvh;display:flex;flex-direction:column}
.view,.viewscroll{width:100%}
.scrollarea{max-height:50vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
@keyframes tabInL{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes tabInR{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.anim-l{animation:tabInL .2s ease-out}
.anim-r{animation:tabInR .2s ease-out}
.scrollarea .slabel2{position:sticky;top:0;background:#000;z-index:1;margin:0}
.tabs{display:flex;border-bottom:0.5px solid var(--border);background:var(--surface-2)}
.tab{flex:1;padding:10px 2px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tab.active{color:var(--text-accent);border-bottom-color:var(--border-accent)}
.topbar{display:flex;align-items:center;gap:6px;padding:10px 12px;background:var(--surface-2);border-bottom:0.5px solid var(--border)}
.topbar-title{font-size:14px;font-weight:500;color:var(--text-primary);flex:1}
.topbar-val{font-size:14px;font-weight:500}
.mnav{background:none;border:none;cursor:pointer;color:var(--text-secondary);font-size:18px;padding:2px 6px}
.gear{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:2px}
.pos{color:var(--text-success)}
.neg{color:var(--text-danger)}
.zero{color:var(--text-muted)}
.sbar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;padding:10px 12px;background:var(--surface-1);border-bottom:0.5px solid var(--border)}
.sc{background:var(--surface-2);border-radius:var(--radius);padding:8px 10px}
.slabel{font-size:10px;color:var(--text-muted);margin-bottom:2px}
.sval{font-size:13px;font-weight:500}
.snote{font-size:9px;color:var(--text-muted);margin-top:1px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);border-left:0.5px solid var(--border);border-top:0.5px solid var(--border)}
.cdow{font-size:11px;color:var(--text-muted);text-align:center;padding:5px 0;background:var(--surface-1);border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border)}
.cdow.s{color:var(--text-danger)}.cdow.sa{color:var(--text-accent)}
.cc{min-height:58px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);padding:3px 2px;cursor:pointer;background:var(--surface-2);-webkit-tap-highlight-color:transparent}
@media(hover:hover){.cc:hover{background:var(--surface-1)}}
.cc.emp{background:var(--surface-0);cursor:default}
.cc.tod{background:var(--bg-accent)}
.dn{font-size:11px;color:var(--text-secondary);text-align:center}
.dn.s{color:var(--text-danger)}.dn.sa{color:var(--text-accent)}
.ct{font-size:10px;font-weight:500;text-align:center;margin-top:2px}
.csub{font-size:9px;color:var(--text-muted);text-align:center}
.tmrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:8px 12px;border-bottom:0.5px solid var(--border);background:var(--surface-2)}
.tm{background:var(--surface-1);border-radius:var(--radius);padding:5px;text-align:center}
.tmn{font-size:10px;color:var(--text-muted);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tmv{font-size:11px;font-weight:500}
.slabel2{font-size:11px;color:var(--text-muted);padding:7px 12px 3px;border-bottom:0.5px solid var(--border)}
.elist{padding:0 12px}
.ei{border-bottom:0.5px solid var(--border);padding:9px 0;display:flex;align-items:flex-start;gap:7px;cursor:pointer}
.ei:hover{background:var(--surface-1);margin:0 -12px;padding:9px 12px}
.edb{min-width:26px;background:var(--surface-1);border-radius:3px;padding:2px 0;text-align:center;font-size:10px;color:var(--text-muted);margin-top:2px;flex-shrink:0}
.einfo{flex:1}
.estore{font-size:12px;color:var(--text-primary);font-weight:500}
.edet{font-size:10px;color:var(--text-muted);margin-top:2px;line-height:1.5}
.ebadge{display:inline-block;font-size:8px;padding:1px 4px;border-radius:3px;margin-left:3px;vertical-align:middle}
.ebadge.ev{background:var(--bg-pro);color:var(--text-pro)}
.ebadge.st{background:var(--bg-warning);color:var(--text-warning)}
.eright{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0}
.eamt{font-size:12px;font-weight:500}
.esub{font-size:9px;color:var(--text-muted)}
.pbar{display:flex;gap:5px;padding:7px 12px;background:var(--surface-1);border-bottom:0.5px solid var(--border);align-items:center}
.pb{padding:3px 9px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-2);color:var(--text-secondary);font-size:11px;cursor:pointer}
.pb.a{background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent)}
.ysel{padding:3px 7px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-size:11px;margin-left:auto}
.asec{padding:10px 12px}
.acard{background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:10px}
.actitle{font-size:11px;color:var(--text-muted);margin-bottom:8px;font-weight:500}
.ag2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.ag3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:8px}
.ast{background:var(--surface-1);border-radius:var(--radius);padding:7px 9px}
.astl{font-size:9px;color:var(--text-muted);margin-bottom:2px}
.astv{font-size:13px;font-weight:500}
.evrow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border);font-size:11px}
.evrow:last-child{border-bottom:none}
.evhead{font-size:10px;color:var(--text-muted);padding:6px 0 3px;font-weight:500}
.mevc{background:var(--surface-1);border-radius:var(--radius);padding:8px;margin-bottom:6px}
.mevn{font-size:11px;font-weight:500;color:var(--text-primary);margin-bottom:5px}
.mevg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.mevs{text-align:center}
.mevsl{font-size:8px;color:var(--text-muted);margin-bottom:1px}
.mevsv{font-size:11px;font-weight:500}
.lgrow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px;align-items:center}
.lgi{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text-secondary)}
.lgd{width:9px;height:9px;border-radius:2px}
.gtabs{display:flex;gap:5px;margin-bottom:8px;align-items:center}
.gtab{padding:3px 8px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-1);color:var(--text-secondary);font-size:10px;cursor:pointer}
.gtab.a{background:var(--bg-accent);color:var(--text-accent);border-color:var(--border-accent)}
.msel{padding:3px 6px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-1);color:var(--text-primary);font-size:10px}
.medal-sec{padding:12px}
.medal-member{background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;margin-bottom:10px}
.medal-member-name{font-size:13px;font-weight:500;color:var(--text-primary);margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.medal-store-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border)}
.medal-store-row:last-child{border-bottom:none}
.medal-store-name{font-size:12px;color:var(--text-secondary)}
.medal-store-val{font-size:14px;font-weight:500;color:var(--text-primary)}
.medal-store-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.medal-edit-btn{font-size:11px;color:var(--text-accent);background:none;border:none;cursor:pointer;padding:3px 6px}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:100;align-items:flex-end;justify-content:center;padding-top:0}
.modal-bg.open{display:flex}
.modal{background:var(--surface-2);border-radius:18px 18px 0 0;width:100%;max-width:480px;overflow:hidden;max-height:88vh;display:flex;flex-direction:column;animation:sheetUp .26s cubic-bezier(.2,.8,.3,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.grab{width:38px;height:4px;border-radius:99px;background:#3a3a3c;margin:8px auto 2px;flex-shrink:0}
#mdrag{flex-shrink:0;cursor:grab;touch-action:none}
.flwrap{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.imark{width:15px;height:15px;border:0.5px solid var(--border-strong);border-radius:50%;font-size:10px;font-style:italic;font-weight:700;color:var(--text-muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex:none;line-height:1}
.ihint{display:none;position:relative;margin:0 0 7px;font-size:10.5px;color:#d0d0d4;background:#1c1c1e;border:0.5px solid var(--border-strong);border-radius:9px;padding:7px 9px;line-height:1.55}
.ihint.show{display:block;animation:fabPop .16s ease-out}
.ihint::before{content:"";position:absolute;top:-5px;left:14px;width:9px;height:9px;background:#1c1c1e;border-left:0.5px solid var(--border-strong);border-top:0.5px solid var(--border-strong);transform:rotate(45deg)}
.sechd{display:flex;justify-content:space-between;align-items:center;margin:0 0 9px}
.sechd .st{font-size:12px;font-weight:700;letter-spacing:.04em}
.secbox{background:var(--surface-1);border:0.5px solid var(--border-strong);border-radius:14px;padding:11px 12px 11px 13px;margin-bottom:11px;border-left-width:3px;box-shadow:0 1px 0 rgba(255,255,255,0.03) inset, 0 2px 8px rgba(0,0,0,0.35)}
#secSt{border-left-color:#5b8def}
#secEn{border-left-color:var(--text-success)}
#secMm{border-left-color:#6b6b72}
#secSt .st{color:#7ea5f0}
#secEn .st{color:var(--text-success)}
#secMm .st{color:var(--text-secondary)}
.secview .vrow{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:13px;border-bottom:0.5px solid rgba(255,255,255,0.045)}
.secview .vrow:last-child{border-bottom:none}
.vl{color:var(--text-muted);flex:none}
.vv{color:#a8a8ae;font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
.vmut{color:var(--text-muted);font-weight:400}
.vmemo{font-size:13px;color:var(--text-primary);line-height:1.6;white-space:pre-wrap}
.memobox{background:rgba(255,255,255,0.025);border-radius:8px;padding:9px 11px;font-size:13px;line-height:1.6;color:#9a9aa0;white-space:pre-wrap;max-height:92px;overflow:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.memobox.exp{max-height:300px}
.memoempty{color:var(--text-muted)}
.memoacts{display:flex;justify-content:flex-end;margin-top:6px;min-height:18px}
.memo-full{font-size:16px;line-height:1.7;color:#d7d7db;white-space:pre-wrap;padding:6px 2px;flex:1;min-height:0;overflow:auto;-webkit-overflow-scrolling:touch}
.memo-edit{flex:1;min-height:0;width:100%;background:transparent;border:none;outline:none;font-size:17px;line-height:1.7;color:#e8e8ea;padding:2px;font-family:inherit;resize:none;overflow:auto;-webkit-overflow-scrolling:touch;-webkit-tap-highlight-color:transparent}
#memobody{display:flex;flex-direction:column;overflow:hidden!important;touch-action:none}
.mlcalc{background:#0e0e10;border:0.5px solid var(--border-strong);border-radius:12px;padding:11px 13px;margin-bottom:6px}
.mlcrow{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0}
.mlcrow .mll{font-size:12px;color:var(--text-muted)}
.mlcv{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--text-muted)}
.mlcv.pos{color:var(--text-success)}
.mlcv.neg{color:var(--text-danger)}
.mlcv.big{font-size:20px}
body.modal-open #wrap{overflow:hidden!important}
.modal-bg{overscroll-behavior:contain;touch-action:none}
.mh{padding:11px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mt{font-size:14px;font-weight:500;color:var(--text-primary)}
.mx{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);line-height:1}
.ms{overflow-y:auto;flex:1;padding:13px 14px;touch-action:pan-y;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.mf{padding:9px 14px;border-top:0.5px solid var(--border);display:flex;gap:7px;flex-shrink:0}
.fr{margin-bottom:10px}
.fl{font-size:11px;color:var(--text-secondary);margin-bottom:3px;display:block}
.fsl{font-size:10px;color:var(--text-muted);margin-bottom:4px}
.fr input,.fr select,.fr textarea{width:100%;padding:9px 11px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-1);color:var(--text-primary);font-size:16px}
.fr textarea{font-family:inherit;line-height:1.55;min-height:54px;resize:vertical}
.rg{display:flex;gap:5px}
.ro{flex:1;padding:6px 3px;border:0.5px solid var(--border-strong);border-radius:var(--radius);text-align:center;cursor:pointer;font-size:11px;color:var(--text-secondary);background:var(--surface-1)}
.ro.sel{border-color:var(--border-accent);color:var(--text-accent);background:var(--bg-accent)}
.ro.sev{border-color:#afa9ec;color:var(--text-pro);background:var(--bg-pro)}
.btn{padding:8px 14px;border-radius:var(--radius);font-size:13px;cursor:pointer;font-weight:500;border:0.5px solid var(--border-strong);background:var(--surface-1);color:var(--text-primary);flex:1}
.btn.p{background:var(--fill-accent);border-color:var(--fill-accent);color:var(--on-accent)}
.btn.danger{color:var(--text-danger);border-color:var(--border-danger)}
.div{height:0.5px;background:var(--border);margin:10px 0}
.stlabel{font-size:10px;color:var(--text-muted);letter-spacing:0.4px;margin:12px 0 6px}
.stitem{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--border)}
.stitem:last-child{border-bottom:none}
.stitem input{width:120px;padding:6px 8px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-1);color:var(--text-primary);font-size:16px}
.auth-ov{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--surface-0);z-index:1000;padding:20px}
.auth-card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:var(--radius);padding:28px 22px;max-width:340px;width:100%;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.auth-logo{font-size:34px;margin-bottom:8px}
.auth-title{font-size:16px;font-weight:600;color:var(--text-primary);margin-bottom:10px}
.auth-msg{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:18px;min-height:34px}
.auth-btn{width:100%;padding:11px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;border:0.5px solid var(--fill-accent);background:var(--fill-accent);color:var(--on-accent)}
.auth-btn-sub{width:100%;margin-top:10px;padding:9px;border-radius:var(--radius);font-size:12px;cursor:pointer;border:0.5px solid var(--border-strong);background:var(--surface-1);color:var(--text-secondary)}
.auth-or{font-size:11px;color:var(--text-muted);margin:16px 0 8px}
.auth-input{width:100%;padding:10px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-1);color:var(--text-primary);font-size:16px;text-align:center;letter-spacing:3px;text-transform:uppercase}
.auth-name{width:100%;padding:10px;border-radius:var(--radius);border:0.5px solid var(--border-strong);background:var(--surface-1);color:var(--text-primary);font-size:15px;text-align:center}

/* ===== Robinhood調 フラット・オーバーライド ===== */
.tabs{position:sticky;top:0;z-index:20;display:flex;align-items:stretch;padding:0;background:#000;border-bottom:0.5px solid var(--border)}
.tabscroll{display:flex;gap:18px;overflow-x:auto;padding:0 14px;flex:1;scrollbar-width:none}
.tabscroll::-webkit-scrollbar{display:none}
.tabicons{display:flex;align-items:center;gap:2px;padding:0 8px;border-left:0.5px solid var(--border)}
.tab{flex:0 0 auto;padding:12px 0;font-size:13px;font-weight:500;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-0.5px;overflow:visible;white-space:nowrap}
.tab.active{color:#fff;border-bottom-color:var(--text-success)}
.vbanner{display:flex;align-items:center;gap:6px;padding:7px 16px;font-size:11px;color:var(--text-secondary);background:var(--surface-1);border-bottom:0.5px solid var(--border)}
.vbanner.team{color:var(--text-success)}
.vbanner .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex:none}
.vhead{display:flex;align-items:center;gap:9px;padding:7px 16px 0}
.vhead .av{width:30px;height:30px;border-radius:50%;background:#1c1c1e;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;overflow:hidden;flex:none}
.vhead .av img{width:100%;height:100%;object-fit:cover}
.vhead .nm{font-size:15px;font-weight:600}
.topbar{background:#000;border-bottom:none;padding:12px 16px 2px}
.topbar-title{font-size:14px;color:var(--text-secondary);font-weight:500}
.topbar-val{display:none}
.mnav{color:var(--text-muted);font-size:18px}
.gear{color:var(--text-muted);font-size:16px}
.iconbtn{background:none;border:none;cursor:pointer;color:var(--text-secondary);padding:5px;display:inline-flex;align-items:center;border-radius:8px}
.iconbtn:active{background:#1c1c1e}
.prow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid var(--border)}
.pavatar{width:48px;height:48px;border-radius:50%;background:#1c1c1e;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:600;color:#fff;overflow:hidden}
.pavatar img{width:100%;height:100%;object-fit:cover}
.lbadge{font-size:9px;font-weight:600;color:var(--on-accent);background:var(--text-success);border-radius:5px;padding:1px 5px;margin-left:6px;vertical-align:middle}
.linkbtn{background:none;border:0.5px solid var(--border-strong);color:var(--text-secondary);font-size:11px;font-weight:500;cursor:pointer;padding:5px 12px;border-radius:999px;line-height:1;white-space:nowrap}
.linkbtn:active{background:#1c1c1e}
.linkbtn+.linkbtn{margin-left:6px}
.linkbtn.danger{color:var(--text-danger);border-color:var(--border-danger)}
.pcard{background:#0e0e10;border:0.5px solid var(--border);border-radius:14px;padding:13px 14px;margin-bottom:10px}
.pcard-t{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:0.04em;margin-bottom:9px;text-transform:uppercase}
.phero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 0 4px}
.phero .av{width:64px;height:64px;border-radius:50%;background:#1c1c1e;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:#fff;overflow:hidden;margin-bottom:9px}

let MEMBERS=[{uid:"u0",name:"たろう"},{uid:"u1",name:"じろう"},{uid:"u2",name:"さぶろう"}];
let uidToMid={u0:0,u1:1,u2:2};

let MI={base_u0_0:1200, base_u1_0:800};

let profEdit=false, stEdit=false, cashEdit=false, kicked=false;

const auth={currentUser:{displayName:"たろう",email:"taro@example.com",photoURL:null}};
function isLeader(){return teamOwner===myUid}

const _now=new Date(); let cy=_now.getFullYear(), cm=_now.getMonth();
let D={};
(function seed(){
  const add=(mid,day,si,inv,col,hr,mac,md,pt,ev,us,uc)=>{
    const k=`${mid}_${cy}_${cm}`;(D[k]||(D[k]=[])).push({
      id:`${mid}-${day}-${Math.random().toString(36).slice(2,7)}`,day,invest:inv,collect:col,hours:hr,
      machine:mac||'',memo:'',storeIdx:si,usedStored:us||0,usedCarry:uc||0,medalDelta:md||0,
      cashPnl:col-inv,playType:pt||'setting',ev:ev||0,mid,uid:MEMBERS[mid].uid,y:cy,mo:cm});
  };
  add(0,3,0,20000,32000,5,'マイジャグラーV',0,'setting',8000);
  add(0,7,0,15000,9000,3,'ハッピージャグラー',0,'setting',-5000);
  add(0,12,1,30000,41000,6,'スマスロ北斗の拳',500,'ev',12000);
  add(1,3,0,18000,26000,4,'ファンキージャグラー',0,'setting',6000);
  add(1,15,1,25000,18000,5,'Lゴジエヴァ',0,'ev',9000,0,300);
  add(2,8,0,22000,35000,5,'ゴーゴージャグラー3',300,'setting',7000);
  add(2,20,1,40000,52000,7,'スマスロモンキーターン',0,'ev',15000);
})();

let ML={'0_2026_5':[
 {id:'ml-demo1',mid:0,day:12,playType:'ev',ev:12000,storeIdx:0,machine:'スマスロ北斗の拳',startMedal:0,invest:20000,usedStored:0,usedCarry:200,endMedal:2000,memo:''},
 {id:'ml-demo2',mid:0,day:8,playType:'setting',ev:0,storeIdx:0,machine:'ゴーゴージャグラー3',startMedal:300,invest:10000,usedStored:0,usedCarry:0,endMedal:null,memo:''}
]};
const mlNum=v=>{const n=parseFloat(v);return isNaN(n)?0:n;};
function mlVals(l){
  const s=S[l.storeIdx]||S[0]||{mp:46,rate:5.16};
  const mp=s.mp||46, rate=s.rate||5.16, yen=100/rate;
  const hasEnd=(l.endMedal!=null && l.endMedal!=='' && !isNaN(parseFloat(l.endMedal)));
  const end=mlNum(l.endMedal), start=mlNum(l.startMedal);
  const cashMedal=mlNum(l.invest)/1000*mp;
  const payout=hasEnd?(end-start):null;
  const sa=hasEnd?(end-(mlNum(l.usedCarry)+mlNum(l.usedStored)+cashMedal)):null;
  const real=hasEnd?Math.round(end*yen-(mlNum(l.invest)+mlNum(l.usedStored)*yen+mlNum(l.usedCarry)*yen)):null;
  return {mp,rate,yen,cashMedal,payout,sa,real,hasEnd};
}
function gML(mid,y,mo){ return ML[mid+'_'+y+'_'+mo]||[]; }
window.saveMLog=function(mid,log){ const k=mid+'_'+cy+'_'+cm; if(!ML[k])ML[k]=[]; const arr=ML[k]; const i=arr.findIndex(x=>x.id===log.id); const rec={...log,mid}; if(i>=0)arr[i]=rec; else arr.push(rec); ra(); };
window.deleteMLog=function(id){ for(const k in ML){ ML[k]=ML[k].filter(x=>x.id!==id); } ra(); };

function saveMedals(){ ra(); }

  const k=`${mid}_${cy}_${cm}`;const arr=(D[k]||(D[k]=[]));
  const i=arr.findIndex(x=>x.id===entry.id);const rec={...entry,mid,uid:MEMBERS[mid].uid,y:cy,mo:cm};
  if(i>=0)arr[i]=rec;else arr.push(rec);ra();
}

// ============================================================
// ユーティリティ
// ============================================================
function f(v){if(v===0)return'±0';return(v>0?'+':'')+v.toLocaleString()}
function fh(v){return(v>=0?'+':'')+Math.round(v).toLocaleString()}
function c(v){return v>0?'pos':v<0?'neg':'zero'}
function gE(m,y,mo){return D[`${m}_${y}_${mo}`]||[]}
function mY(med,si){const s=S[si];if(!s||!med)return 0;return Math.round(med*(100/s.rate))}
function dim(y,mo){return new Date(y,mo+1,0).getDate()}
function fd(y,mo){return new Date(y,mo,1).getDay()}
function gYears(){const ys=new Set([cy]);Object.keys(D).forEach(k=>{const p=k.split('_');if(D[k]?.length)ys.add(+p[1])});return[...ys].sort()}

// ============================================================
// 貯メダル管理
// ============================================================
function getMedalKey(mid,si){return`${MEMBERS[mid]?.uid||mid}_${si}`}
function getBaseMedal(mid,si){return MI[`base_${getMedalKey(mid,si)}`]||0}
function getAutoMedal(mid,si){
  const ys=gYears();let total=0;
  ys.forEach(y=>{for(let mo=0;mo<12;mo++){gE(mid,y,mo).filter(e=>e.storeIdx===si).forEach(e=>{total+=(e.medalDelta||0)})}});
  return total;
}
function getCurrentMedal(mid,si){return getBaseMedal(mid,si)+getAutoMedal(mid,si)}

// ============================================================
// 収支計算ロジック
// ============================================================
function pnl(e){
  const cash=e.cashPnl;
  // 貯メダル保存分はプラス、投資使用分はマイナス
  const storedSave=mY(e.medalDelta||0,e.storeIdx);
  const usedStoredCost=mY(e.usedStored||0,e.storeIdx);
  const usedCarryCost=mY(e.usedCarry||0,e.storeIdx);
  const real=cash+storedSave-usedStoredCost-usedCarryCost;
  return{cash,real};
}
function hw(e){if(!e.hours||e.hours<=0)return null;return Math.round(pnl(e).real/e.hours)}

function mSum(mid,y,mo){
  const es=gE(mid,y,mo);
  let cash=0,real=0,medals=0,hrs=0,evT=0,evR=0,evc=0,eve=0,evs=0;
  es.forEach(e=>{const p=pnl(e);cash+=p.cash;real+=p.real;medals+=(e.medalDelta||0);hrs+=(e.hours||0);if(e.ev){evT+=e.ev;evR+=p.real;evc++;e.playType==='ev'?eve++:evs++}});
  return{cash,real,medals,count:es.length,hrs,hourly:hrs>0?Math.round(real/hrs):null,evT,evR,evc,eve,evs};
}
function ySum(mid,y){
  let r={cash:0,real:0,medals:0,count:0,hrs:0,hourly:null,evT:0,evR:0,evc:0,eve:0,evs:0};
  for(let mo=0;mo<12;mo++){const s=mSum(mid,y,mo);for(const k in r)if(k!=='hourly')r[k]+=s[k]||0}
  r.hourly=r.hrs>0?Math.round(r.real/r.hrs):null;return r;
}
function aSum(mid){
  const ys=gYears();let r={cash:0,real:0,medals:0,count:0,hrs:0,hourly:null,evT:0,evR:0,evc:0,eve:0,evs:0};
  ys.forEach(y=>{const s=ySum(mid,y);for(const k in r)if(k!=='hourly')r[k]+=s[k]||0});
  r.hourly=r.hrs>0?Math.round(r.real/r.hrs):null;return r;
}
function teamCashBal(){ let cc=0; N.forEach((_,i)=>cc+=aSum(i).cash); return initCash+cc; }
function daySum(mid,d){
  const es=gE(mid,cy,cm).filter(e=>e.day===d);
  let cash=0,real=0,medals=0,hrs=0;
  es.forEach(e=>{const p=pnl(e);cash+=p.cash;real+=p.real;medals+=(e.medalDelta||0);hrs+=(e.hours||0);});
  return{cash,real,medals,count:es.length,hrs,hourly:hrs>0?Math.round(real/hrs):null};
}
function teamDaySum(d){
  let cash=0,real=0,medals=0,hrs=0,count=0;
  N.forEach((_,mid)=>{const s=daySum(mid,d);cash+=s.cash;real+=s.real;medals+=s.medals;hrs+=s.hrs;count+=s.count;});
  return{cash,real,medals,count,hrs,hourly:hrs>0?Math.round(real/hrs):null};
}
window.pickDay=function(day){ selDay=(selDay===day)?null:day; ra(); };
function teamMedalStat(){ let m=0,y=0; N.forEach((_,i)=>S.forEach((st,si)=>{const cur=getCurrentMedal(i,si); m+=cur; y+=mY(cur,si);})); return {medals:m,yen:y}; }
function memberMedalBlockHtml(mid){
  let m=0,y=0; S.forEach((st,si)=>{const cur=getCurrentMedal(mid,si); m+=cur; y+=mY(cur,si);});
  return `<div style="flex-basis:100%;display:flex;justify-content:flex-end">`
    +`<div style="min-width:172px;font-size:11px;color:var(--text-muted);line-height:1.7">`
    +`<div style="display:flex;justify-content:space-between;gap:14px"><span>貯メダル残高</span><span style="color:#9a9aa0;font-weight:600">${m.toLocaleString()}枚 <span style="color:var(--text-muted);font-weight:400">≈${y.toLocaleString()}円</span></span></div>`
    +`</div></div>`;
}
function balBlockHtml(){
  const cash=teamCashBal(), ms=teamMedalStat(), real=cash+ms.yen;
  const row=(label,val)=>`<div style="display:flex;justify-content:space-between;gap:14px"><span>${label}</span><span style="color:#9a9aa0;font-weight:600">${val}</span></div>`;
  return `<div style="flex-basis:100%;display:flex;justify-content:flex-end">`
    +`<div style="min-width:172px;font-size:11px;color:var(--text-muted);line-height:1.7">`

function detStr(e){
  const p=pnl(e),h=hw(e);let a=[];
  a.push(`現金投資${e.invest.toLocaleString()} → 回収${e.collect.toLocaleString()}`);
  if(e.usedStored)a.push(`貯メダル投資${e.usedStored}枚(−${mY(e.usedStored,e.storeIdx).toLocaleString()}円)`);
  if(e.usedCarry)a.push(`持ちメダル投資${e.usedCarry}枚(−${mY(e.usedCarry,e.storeIdx).toLocaleString()}円)`);
  if(e.medalDelta)a.push(`貯${e.medalDelta>0?'+':''}${e.medalDelta}枚`);
  if(e.hours)a.push(`${e.hours}h`);

function machineList(){
  const cnt={};
  for(const k in D){ for(const e of (D[k]||[])){ const m=(e.machine||'').trim(); if(m) cnt[m]=(cnt[m]||0)+1; } }
  for(const k in ML){ for(const l of (ML[k]||[])){ const m=(l.machine||'').trim(); if(m) cnt[m]=(cnt[m]||0)+1; } }
  return Object.keys(cnt).sort((a,b)=> cnt[b]-cnt[a] || a.localeCompare(b));
}

function curForm(){

}
function vrow(label,val){ return `<div class="vrow"><span class="vl">${label}</span><span class="vv">${val}</span></div>`; }
function vnum(v,unit){ if(v===''||v==null||isNaN(parseFloat(v))) return '<span class="vmut">未入力</span>'; return parseFloat(v).toLocaleString()+(unit||''); }
function applyMLLocks(){

let mlSnap={};
function secFields(sec){ return sec==='start'?['playType','ev','storeIdx','machine','startMedal']:sec==='end'?['invest','usedStored','usedCarry','endMedal']:['memo']; }
function snapSec(sec){ const f=curForm(); const o={}; secFields(sec).forEach(k=>o[k]=f[k]); mlSnap[sec]=o; }
function restoreSec(sec){
  const o=mlSnap[sec]; if(!o) return;
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.value=(v==null?'':v);};
  if(sec==='start'){ if(o.playType) sPTm(o.playType); set('fev',o.ev); const fst=document.getElementById('fst'); if(fst&&o.storeIdx!=null) fst.value=String(o.storeIdx); set('fmc',o.machine); set('fsm',o.startMedal); }
  else if(sec==='end'){ set('fin',o.invest); set('fus',o.usedStored); set('fuc',o.usedCarry); set('fem',o.endMedal); }
  else { set('fmm',o.memo); }
}
function setLock(sec,b){ if(sec==='start')mlStartLock=b; else if(sec==='end')mlEndLock=b; else mlMemoLock=b; }
window.tgSec=function(sec){
  const locked = sec==='start'?mlStartLock:sec==='end'?mlEndLock:mlMemoLock;
  if(locked){ snapSec(sec); setLock(sec,false); }   // 編集を開始（編集前を控える）
  else { setLock(sec,true); }                        // 完了＝確定して閉じる
  applyMLLocks(); mlCalc();
};
window.cancelSec=function(sec){ restoreSec(sec); setLock(sec,true); applyMLLocks(); mlCalc(); };
window.sPTm=function(t){ document.getElementById('rs').className='ro'+(t==='setting'?' sel':''); document.getElementById('re').className='ro'+(t==='ev'?' sev sel':''); };
window.mlCalc=function(){
  const f=curForm(); const v=mlVals(f);
  const setv=(id,val,unit)=>{const el=document.getElementById(id);if(!el)return;if(val===null){el.textContent='—';el.className=el.className.replace(/\s*(pos|neg)/g,'');}else{el.textContent=(val>0?'+':'')+val.toLocaleString()+unit;el.className=el.className.replace(/\s*(pos|neg)/g,'')+(val>0?' pos':val<0?' neg':'');}};
  setv('cPay',v.payout,'枚'); setv('cSa',v.sa,'枚'); setv('cReal',v.real,'円');
};
window.svML=function(mid,day,editId){
  const machine=document.getElementById('fmc')?.value.trim()||'';
  if(!machine){ alert('台名を入力してください'); return; }
  let storeIdx=parseInt(document.getElementById('fst')?.value); if(isNaN(storeIdx)||storeIdx<0||storeIdx>=S.length) storeIdx=0;
  const gv=id=>{const el=document.getElementById(id);return el&&el.value!==''?parseFloat(el.value):null;};
  const isEv=document.getElementById('re')?.classList.contains('sel');
  const log={
    id:editId||`${mid}-ml-${Date.now()}-${Math.random().toString(36).slice(2,7)}`,
    day, playType:isEv?'ev':'setting', ev:gv('fev')||0, storeIdx, machine,
    startMedal:gv('fsm')||0,
    invest:gv('fin')||0, usedStored:gv('fus')||0, usedCarry:gv('fuc')||0,
    endMedal:(document.getElementById('fem')?.value!==''?(gv('fem')||0):null),
    memo:document.getElementById('fmm')?.value.trim()||''
  };
  saveMLog(mid,log); cM();
};
window.onFstChange=async function(){
  const sel=document.getElementById('fst'); if(!sel||sel.value!=='__add') return;
  const name=(prompt('新しい店舗名を入力してください')||'').trim();
  if(!name){ sel.value='0'; return; }
  S.push({name, mp:46, rate:5.16});
  await saveConfig();
  const idx=S.length-1;
  sel.innerHTML=S.map((s,i)=>`<option value="${i}">${(s.name||'').replace(/"/g,'&quot;')}</option>`).join('')+'<option value="__add">＋ 新しい店舗を追加</option>';
  sel.value=String(idx);
  mlCalc();
  alert('店舗「'+name+'」を追加しました。\n貸しメダル・交換率は設定（⚙）で調整できます。');
};
window.delE=function(mid,id){deleteMLog(id);cM()};

window.oSet=function(){
  document.getElementById('mtitle').textContent='設定';
  const leader=isLeader();
  const inpStyle='width:100%;padding:8px 10px;border:0.5px solid var(--border-strong);border-radius:var(--radius);background:var(--surface-2);color:var(--text-primary);font-size:16px';
  // 店舗・レート
  const storeView = stEdit
    ? S.map((s,i)=>`<div style="background:var(--surface-1);border-radius:var(--radius);padding:9px;margin-bottom:7px">
        <div class="fr" style="margin-bottom:7px"><label class="fl">店舗名</label><input id="ssn${i}" value="${s.name}"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
          <div>
            <div class="flwrap"><span class="fl" style="margin:0">貸しメダル</span><span class="imark" onclick="tgInfo('si_mp${i}')">i</span></div>
            <div class="ihint" id="si_mp${i}">1000円で借りられる枚数。<br>例：1000円→46枚なら「46」</div>
            <input id="ssp${i}" type="number" value="${s.mp}" style="${inpStyle}">
          </div>
          <div>
            <div class="flwrap"><span class="fl" style="margin:0">交換率</span><span class="imark" onclick="tgInfo('si_rt${i}')">i</span></div>
            <div class="ihint" id="si_rt${i}">換金のとき何枚で100円か。<br>例：5.16枚で100円なら「5.16」</div>
            <input id="ssr${i}" type="number" step="0.01" value="${s.rate}" style="${inpStyle}">
          </div>
        </div>
        ${S.length>1?`<button class="linkbtn danger" style="margin-top:4px" onclick="rmSt(${i})">削除</button>`:''}
      </div>`).join('') + `<button class="btn" style="width:100%;margin-top:3px" onclick="addSt()">＋ 店舗を追加</button>`
    : S.map(s=>`<div class="prow"><div><div style="font-size:14px;font-weight:500">${s.name}</div><div style="font-size:11px;color:var(--text-muted)">貸しメダル 1000円→${s.mp}枚 ・ 交換率 ${s.rate}枚→100円</div></div></div>`).join('');
  const storeSection = `<div style="display:flex;justify-content:space-between;align-items:center"><div class="stlabel">店舗・レート</div><button class="tlink" onclick="toggleStEdit()">${stEdit?'完了':'編集'}</button></div>${storeView}`;
  // 初期現金（リーダーのみ・専用の編集ボタン）
  const cashSection = `<div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px"><div class="stlabel">チームの初期現金</div>${leader?`<button class="tlink" onclick="toggleCashEdit()">${cashEdit?'キャンセル':'編集'}</button>`:''}</div>`+
    (cashEdit&&leader
      ? `<div class="fr"><input id="set-cash" type="number" inputmode="numeric" value="${initCash}"><div style="font-size:10px;color:var(--text-muted);margin:3px 0 7px">総資産の起点（収支には含めません）</div><button class="btn p" style="width:100%" onclick="svCash()">初期現金を保存</button></div>`
      : `<div class="prow"><div><div style="font-size:15px;font-weight:600">${initCash.toLocaleString()} 円</div><div style="font-size:10px;color:var(--text-muted)">総資産の起点（収支には含めない）${leader?'':' ・ 変更はリーダーのみ'}</div></div></div>`);
  // メンバー管理（リーダーのみ）
  let memberSection='';
  if(leader){
    memberSection = `<div class="stlabel" style="margin-top:14px">メンバー管理（リーダー）</div>`+
      MEMBERS.map(m=>`<div class="prow"><div style="font-size:14px">${m.name}${m.uid===teamOwner?'<span class="lbadge">リーダー</span>':''}</div><div style="white-space:nowrap">`+
        (m.uid!==myUid?`<button class="tlink" onclick="transferLeader('${m.uid}','${m.name}')">リーダーに変更</button><button class="linkbtn danger" style="margin-left:4px" onclick="kickMember('${m.uid}','${m.name}')">追放</button>`:'<span style="font-size:10px;color:var(--text-muted)">あなた</span>')+`</div></div>`).join('');
  }
  // 招待コード
  const codeSection = `<div class="stlabel" style="margin-top:14px">招待コード</div>
    <div class="prow"><div style="font-size:16px;font-weight:600;letter-spacing:2px">${inviteCode||'—'}</div><button class="linkbtn" onclick="copyCode()">コピー</button></div>
    <div style="font-size:10px;color:var(--text-muted);margin:2px 0 6px">このコードを伝えると、相手はログイン後にチームへ参加できます</div>
    <button class="imp-btn" onclick="importLocal()">この端末の旧データ(localStorage)を取り込む</button>`;
  document.getElementById('mbody').innerHTML = storeSection + cashSection + memberSection + codeSection;
  document.getElementById('mfoot').innerHTML = stEdit
    ? `<button class="btn" onclick="cancelSt()">キャンセル</button><button class="btn p" onclick="svSet()">保存</button>`
    : `<button class="btn p" style="width:100%" onclick="cM()">閉じる</button>`;
  oM();
};
function readStoreInputs(){
  S=S.map((s,i)=>({name:document.getElementById(`ssn${i}`)?.value||s.name,mp:parseFloat(document.getElementById(`ssp${i}`)?.value)||s.mp,rate:parseFloat(document.getElementById(`ssr${i}`)?.value)||s.rate}));
  const v=document.getElementById('set-cash'); if(v&&isLeader()) initCash=parseFloat(v.value)||0;
}
window.toggleStEdit=function(){ if(stEdit) readStoreInputs(); stEdit=!stEdit; oSet(); };
window.tgInfo=function(id){const el=document.getElementById(id);if(!el)return;const open=el.classList.contains('show');document.querySelectorAll('.ihint.show').forEach(e=>e.classList.remove('show'));if(!open)el.classList.add('show');};
window.toggleCashEdit=function(){ cashEdit=!cashEdit; oSet(); };
window.svCash=async function(){
  const v=document.getElementById('set-cash'); if(v) initCash=parseFloat(v.value)||0;
  await saveConfig(); cashEdit=false; oSet();
};
window.cancelSt=function(){ stEdit=false; oSet(); };
window.rmSt=function(i){ if(S.length<=1){alert('店舗は最低1つ必要です');return;} readStoreInputs(); if(!confirm(S[i].name+' を削除しますか？')) return; S.splice(i,1); oSet(); };
window.addSt=function(){ readStoreInputs(); S.push({name:'新しい店舗',mp:46,rate:5.16}); stEdit=true; oSet(); };

window.svSet=async function(){
  readStoreInputs();
  await saveConfig(); stEdit=false; cM();
};
window.kickMember=async function(uid,name){
  if(!isLeader()) return;
  if(!confirm(name+' をチームから追放しますか？')) return;
  try{ await deleteDoc(doc(db,'teams',teamId,'members',uid)); oSet(); }catch(e){ alert('追放に失敗：'+e.message); }
};
window.transferLeader=async function(uid,name){
  if(!isLeader()) return;
  if(!confirm('リーダーを '+name+' に譲りますか？\nあなたはメンバー管理ができなくなります。')) return;
  try{ await setDoc(teamDoc,{owner:uid},{merge:true}); oSet(); }catch(e){ alert('変更に失敗：'+e.message); }
};

window.oProfile=function(){
  const u=auth.currentUser||{};
  const mm=(myUid!=null)?uidToMid[myUid]:null;
  const myName=(mm!=null)?N[mm]:defaultName(u);
  const tot=(mm!=null)?aSum(mm):{real:0,hrs:0,hourly:null};
  const mon=(mm!=null)?mSum(mm,cy,cm):{real:0,hrs:0,hourly:null};
  const av=u.photoURL?`<img src="${u.photoURL}" alt="">`:`${(myName||'?').slice(0,1)}`;
  const pstat=(label,x)=>`<div class="pstat"><div class="lab">${label}</div><div class="big ${c(x.real)}">${f(x.real)}</div><div class="sub">${x.hrs>0?x.hrs.toFixed(1)+'h':'—'} ・ ${x.hourly!=null?fh(x.hourly)+'円/h':'—'}</div></div>`;
  const account = profEdit
    ? `<div style="display:flex;gap:7px;align-items:center"><input id="pf-name" value="${myName||''}" maxlength="12" style="flex:1;padding:8px 10px;border:0.5px solid var(--border-strong);border-radius:10px;background:#000;color:#fff;font-size:16px"><button class="tlink" onclick="saveProfName()">保存</button><button class="tlink mut" onclick="cancelProfName()">取消</button></div>`
    : `<div class="prow2"><div><div style="font-size:10px;color:var(--text-muted)">表示名</div><div style="font-size:15px;font-weight:600">${myName||'—'}</div></div><button class="tlink" onclick="editProfName()">編集</button></div>`;
  document.getElementById('mtitle').textContent='プロフィール';
  document.getElementById('mbody').innerHTML=`
    <div class="phero">
      <div class="av">${av}</div>
      <div style="font-size:17px;font-weight:700;line-height:1.2">${u.displayName||myName||'—'}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:3px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${u.email||''}</div>
    </div>
    <div class="pcard"><div class="pcard-t">アカウント</div>${account}</div>
    <div class="pcard-t" style="padding:0 2px">成績</div>
    <div class="pgrid2" style="margin-bottom:10px">
      ${pstat('今月（'+(cm+1)+'月）', mon)}
      ${pstat('通算', tot)}
    </div>
    <div class="pcard-t" style="padding:0 2px">貯メダル（現在）</div>
    <div class="pcard">
      ${mm!=null?`<div class="chiprow">${S.map((st,si)=>`<div class="mchip">${st.name} <b>${getCurrentMedal(mm,si).toLocaleString()}</b>枚<span class="yy">≈${mY(getCurrentMedal(mm,si),si).toLocaleString()}円</span></div>`).join('')}</div>`:''}
      <div class="prow2" style="margin-top:11px;border-top:0.5px solid var(--border);padding-top:10px"><div><div style="font-size:12px">初期枚数</div><div style="font-size:10px;color:var(--text-muted)">使い始め時点の枚数（店舗ごと）</div></div><button class="tlink" onclick="oBaseMedal()">編集</button></div>
    </div>
    <div class="pcard-t" style="padding:0 2px">チーム</div>
    <div class="pcard">
      <div class="prow2"><div style="font-size:10px;color:var(--text-muted)">チーム名</div><div style="font-size:14px;font-weight:600">${teamName||'—'}</div></div>
      <div class="codebox"><div><div style="font-size:10px;color:var(--text-muted);margin-bottom:1px">招待コード</div><div class="cd">${inviteCode||'—'}</div></div><button class="linkbtn" onclick="copyCode()">コピー</button></div>
      <div style="margin-top:11px">
        <div style="font-size:10px;color:var(--text-muted);margin-bottom:3px">メンバー（${MEMBERS.length}人）</div>
        ${MEMBERS.map(m=>`<div class="memline"><div class="ma">${(m.name||'?').slice(0,1)}</div><div style="flex:1">${m.name}${m.uid===teamOwner?'<span class="lbadge">リーダー</span>':''}</div>${m.uid===myUid?'<span style="font-size:10px;color:var(--text-muted)">あなた</span>':''}</div>`).join('')}
      </div>
    </div>
    <button class="imp-btn" onclick="logout()">ログアウト</button>`;
  document.getElementById('mfoot').innerHTML=`<button class="btn p" style="width:100%" onclick="cM()">閉じる</button>`;
  oM();
};
window.editProfName=function(){ profEdit=true; oProfile(); };
window.cancelProfName=function(){ profEdit=false; oProfile(); };
window.saveProfName=async function(){
  const v=(document.getElementById('pf-name')?.value||'').trim();
  if(v && myUid && teamId){ try{ await setDoc(doc(db,'teams',teamId,'members',myUid),{name:v},{merge:true}); }catch(e){ alert('保存に失敗：'+e.message); } }
  profEdit=false; oProfile();
};
window.copyCode=function(){
  if(!inviteCode) return;
  try{ navigator.clipboard.writeText(inviteCode); alert('招待コードをコピーしました：'+inviteCode); }
  catch(e){ alert('招待コード：'+inviteCode); }
};

function oM(){document.getElementById('mbg').className='modal-bg open';document.body.classList.add('modal-open')}
function cM(){profEdit=false;stEdit=false;cashEdit=false;document.getElementById('mbg').className='modal-bg';var mb=document.getElementById('memobg');if(mb)mb.className='modal-bg';document.body.classList.remove('modal-open');ra()}
window.cM=cM;
document.getElementById('mclose').onclick=cM;
// ボトムシートを下にドラッグで閉じる
(function(){
  const drag=document.getElementById('mdrag'); if(!drag) return;
  const sheet=()=>document.getElementById('msheet');
  let startY=0,cur=0,dragging=false;
  drag.addEventListener('touchstart',e=>{const s=sheet();if(!s)return;dragging=true;startY=e.touches[0].clientY;cur=0;s.style.transition='none';},{passive:true});
  drag.addEventListener('touchmove',e=>{if(!dragging)return;const dy=e.touches[0].clientY-startY;const s=sheet();if(dy<=0){cur=0;s.style.transform='translateY(0)';return;}cur=dy;s.style.transform=`translateY(${dy}px)`;e.preventDefault();},{passive:false});
  drag.addEventListener('touchend',()=>{if(!dragging)return;dragging=false;const s=sheet();s.style.transition='transform .2s ease';if(cur>90){s.style.transform='translateY(100%)';setTimeout(()=>{s.style.transform='';s.style.transition='';cM();},190);}else{s.style.transform='translateY(0)';setTimeout(()=>{s.style.transform='';s.style.transition='';},210);}});
})();
document.getElementById('mbg').onclick=function(e){if(e.target===this)cM()};

// 左右スワイプでタブ切替（指追従なし・縦スクロールとは誤爆しないよう判定）
(function(){
  const wrap=document.getElementById('wrap'); if(!wrap) return;
  let sx=0, sy=0, tracking=false;
  wrap.addEventListener('touchstart', e=>{
    if(e.touches.length!==1){ tracking=false; return; }
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; tracking=true;
  }, {passive:true});
  wrap.addEventListener('touchend', e=>{
    if(!tracking) return; tracking=false;
    const mbg=document.getElementById('mbg'); if(mbg && mbg.classList.contains('open')) return; // モーダル中は無効
    const t=e.changedTouches[0]; const dx=t.clientX-sx, dy=t.clientY-sy;
    if(Math.abs(dx)<55) return;                 // 動きが小さければ無視
    if(Math.abs(dx) < Math.abs(dy)*1.6) return; // 縦の方が大きければスクロール扱い
    const TAB_MAX=3;                            // タブは0..3
    if(dx<0 && tab<TAB_MAX) window.st(tab+1, 1);   // 左へ → 次のタブ（右から入る）
    else if(dx>0 && tab>0) window.st(tab-1, -1);    // 右へ → 前のタブ（左から入る）
  }, {passive:true});
})();
document.getElementById('auth-overlay').style.display='none';document.getElementById('app').style.display='flex';ra();

</script>
